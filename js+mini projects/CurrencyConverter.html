<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    *{
      padding:0%;
      margin:0%;
    }
  body{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height:100vh;
    background-color: rgba(157, 246, 216, 0.437);
  }
  .form{
   
    align-items: center;
  }
.heading{
  text-align: center;
  color:rgba(6, 82, 6, 0.89);
  font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
  font-size: 30px;
  font-weight: 800;
}
.Amount{

  margin-top: 6%;
}
.input{
font-size: 20px;
font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
font-weight: 600;
}
.inputbox{
  color:rgb(65, 64, 64);
  font-size: 25px;
  border: 2px solid black;
  border-radius: 5px;
  width:180px;
}
.Dropdown{
 
}

.container{
  background-color: rgb(243, 243, 243);
  
}

  </style>
</head>
<body>
  <div class="container">
    <h2 class="heading">Currency Converter</h2>
    <form class="form">
      <div class="Amount">
     <span class="input">Enter Amount:</span>
     <input class="inputbox" type="number" >
      </div>
      <div class="Dropdown">
        <div class="from">
          <p class="from1">From</p>
          <div class="select">
           <img src="https://flagsapi.com/US/shiny/64.png">
            <select name="from">
              <option value="USD">USD</option>
              <option value="IND">IND</option>
              <option value="MAL">MAL</option>
              <option value="JAP">JAP</option>
          </select>
          </div>
      
 
        </div>
          <i class="fa-solid fa-arrow-right-arrow-left "></i>
        <div class="to">
          <p class="To1">To</p>
          <div class="select">
            <img src="https://flagsapi.com/IN/shiny/64.png">
            <select name="from">
              <option value="USD">USD</option>
              <option value="IND">IND</option>
              <option value="MAL">MAL</option>
              <option value="JAP">JAP</option>
          </select>
          </div>
        </div>

      </div>
    </form>

  </div>
