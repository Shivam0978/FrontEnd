<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body id="body">
    <div id="outline">
<div id="cal"><input type="text" id="display" readonly>
    <div class="button-container"><br>
<button id="clear" class="button" onclick="currentDisplay='';document.querySelector('#display').value=currentDisplay; " >C</button>
<button id="1" class="button" onclick="currentDisplay+='1';document.querySelector('#display').value=currentDisplay; ">1</button>
<button id="2" class="button" onclick="currentDisplay+='2'; document.querySelector('#display').value=currentDisplay;">2</button><br>
<button id="plus" class="button" onclick="currentDisplay+='+';document.querySelector('#display').value=currentDisplay;">+</button>
<button id="3" class="button" onclick="currentDisplay+='3'; document.querySelector('#display').value=currentDisplay;">3</button>
<button id="4" class="button" onclick="currentDisplay+='4'; document.querySelector('#display').value=currentDisplay;">4</button><br>
<button id="5" class="button" onclick="currentDisplay+='5'; document.querySelector('#display').value=currentDisplay;">5</button>
<button id="minus" class="button" onclick="currentDisplay+='-'; document.querySelector('#display').value=currentDisplay;">-</button>
<button id="6" class="button" onclick="currentDisplay+='6'; document.querySelector('#display').value=currentDisplay;">6</button><br>
<button id="7" class="button" onclick="currentDisplay+='7'; document.querySelector('#display').value=currentDisplay;">7</button>
<button id="8" class="button" onclick="currentDisplay+='8'; document.querySelector('#display').value=currentDisplay;">8</button>
<button id="into" class="button" onclick="currentDisplay+='*'; document.querySelector('#display').value=currentDisplay;">*</button><br>


<button id="answer" class="button" onclick="
let result=eval(currentDisplay);document.querySelector('#display').value=result; ">=</button>

<button id="9" class="button" onclick="currentDisplay+='9';document.querySelector('#display').value=currentDisplay;">9</button><br>

<button id="0" class="button" onclick="currentDisplay+='0'; document.querySelector('#display').value=currentDisplay;">0</button>
<button id="divide" class="button" onclick="currentDisplay+='/'; document.querySelector('#display').value=currentDisplay;">/</button>
<button id="decimal" class="button" onclick="currentDisplay+='.'; document.querySelector('#display').value=currentDisplay;">.</button>
<button id="delete" class="button" onclick="currentDisplay=currentDisplay.slice(0,-1); document.querySelector('#display').value=currentDisplay;"><=</button>

</div>
</div>
    </div>








    <script src="calculator.js">

    </script>
</body>
</html>
