<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRICKET GAME</title>
    <link rel="stylesheet" href="cricket.css">
</head>
<body>
    
    
    <h1 id="heading">Bat Ball Stump Game</h1>
    <div class="title">
    <h2 id="title">Choose any one of them against comp</h2>
    </div>
   
<button onclick="resetscore()" class="reset">Restart</button>

    <div id="container">

        
        <script>
        let scoreStr = localStorage.getItem('score');
      
        let score=JSON.parse(scoreStr) || {
            win:0,
            lose:0,
            tie:0,
        };
        
       function result(){
        return `Your score is: ${score.win} \t Comp score is: ${score.lose} \t Tie: ${score.tie}`;
       }

       function resetscore(){
       
        score ={
            win:0,
            lose:0,
            tie:0
        };
        localStorage.setItem('score', JSON.stringify(score));
        alert(`||Score Restarted|| \n\n ${result()}`);
       }

</script>

    <button class="button" onclick="
        console.log('you have chosen Bat');
        let randomnum=Math.random()*3;
        /*Math.floor gives integer num by rounding off the random value */
        if(randomnum<=1){
            score.tie++;
            console.log('comp has chosen Bat');
            alert(`Match tie \n Both have chosen Bat \n ${result()}`);

              }
        else if(1<randomnum && randomnum<=2){
             score.win++;
             console.log('comp has chosen Ball');
            alert(`You Won!! \n comp has chosen Ball \n ${result()}`);

        }
        else if(2<randomnum && randomnum<=3){
                score.lose++;
             console.log('comp has chosen Stump');
            alert(`You Lose! \n comp has chosen Stump \n ${result()}`);
            
        }
         console.log(score);
          localStorage.setItem('score', JSON.stringify(score));
           document.querySelector('#result').innerText = result();
        "><img class="img" src="\js\images\bat.png"> Bat</button>
     <button class="button" onclick="
        console.log('you have chosen Ball');
         let randomnum1=Math.random()*3;
        if(randomnum1<=1){
                score.lose++;
            console.log('comp has chosen Bat');
            alert(`You lose! \n comp has chosen Bat \n ${result()}`);
            
        }
        else if(1<randomnum1 && randomnum1<=2){
                score.tie++;
             console.log('comp has chosen Ball');
            alert(`Match tie \n Both have chosen Ball \n ${result()}`);
            
        }
        else if(2<randomnum1 && randomnum1<=3){
                score.win++;
             console.log('comp has chosen Stump');
            alert(`You Won!! \n comp has chosen Stump \n ${result()}`);
            
        } 
         console.log(score);
          localStorage.setItem('score', JSON.stringify(score));
           document.querySelector('#result').innerText = result();

        "><img class="img" src="\js\images\ball.png">Ball</button>
      <button class="button" onclick="
      console.log('you have chosen Stump');

      let randomnum2=Math.random()*3;
      if(randomnum2<=1){
        score.win++;
        console.log('comp has chosen Bat');
        alert(`You won!! \n comp has chosen Bat \n ${result()}`);
        
      }
      else if(1<randomnum2 && randomnum2<=2){
        score.lose++;
        console.log('comp has chosen Ball');
        alert(`You lose! \n comp has chosen Ball \n ${result()}`);
        

      }
      else if(2<randomnum2 && randomnum2<=3){
        score.tie++;
        console.log('comp has chosen Stump');
        alert(`Match tie! \n Both have chosen Stump \n ${result()}`);
        
      }
       console.log(score);
       localStorage.setItem('score', JSON.stringify(score));
        document.querySelector('#result').innerText = result();

      " ><img class="img" src="\js\images\stump.png">Stump</button>

      </div>
       <div class="rules">
        <b><ul>
            <li>bat beats ball </li>
            <li>ball beats stump</li>
            <li>stump throws the bat to pavilion</li>
        </ul></b>

    </div>
    <div class="scoreboard">
        
        <h3 id="result"></h3>
        </div>
    </div>
        
<a href="guess_cricket.html"><h1 class="game2">GAME 2?</h1></a>

</body>
</html>
