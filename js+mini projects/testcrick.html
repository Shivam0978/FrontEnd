<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRICKET GAME</title>
    <link rel="stylesheet" href="cricket.css">
    <style>
    /* Custom alert modal */
    .custom-alert-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9999}
    .custom-alert{background:#fff;padding:20px;border-radius:8px;max-width:90%;width:320px;box-shadow:0 6px 24px rgba(0,0,0,0.2);text-align:center}
    .custom-alert p{margin:0 0 12px}
    .custom-alert button{padding:8px 14px;border:none;background:#007bff;color:#fff;border-radius:4px;cursor:pointer}
    </style>
</head>
<body>
    
    
    <h1 id="heading">Bat Ball Stump Game</h1>
    <div class="title">
    <h2 id="title">Choose any one of them against comp</h2>
    </div>
   

    <div id="container">
                <script>let score={
            win:0,
            lose:0,
            tie:0,

        };
             function result(){
                return `Your score is: ${score.win} \t Comp score is: ${score.lose} \t Tie: ${score.tie}`;
             }

             /* Replace native alert with custom modal showing bold text */
             function showAlert(msg){
                let overlay=document.getElementById('customAlertOverlay');
                let content=document.getElementById('customAlertContent');
                content.innerHTML = '<strong>' + msg.replace(/\n/g,'<br>') + '</strong>';
                overlay.style.display='flex';
             }

             function hideAlert(){
                document.getElementById('customAlertOverlay').style.display='none';
             }

</script>

<!-- Custom alert modal markup -->
<div id="customAlertOverlay" class="custom-alert-overlay" style="display:none">
    <div class="custom-alert" role="dialog" aria-modal="true">
        <div id="customAlertContent"></div>
        <div style="margin-top:12px"><button onclick="hideAlert()">OK</button></div>
    </div>
</div>
    <button class="button" onclick="
        console.log('you have chosen Bat');
        let randomnum=Math.random()*3;
        /*Math.floor gives integer num by rounding off the random value */
        if(randomnum<=1){
            score.tie++;
            console.log('comp has chosen Bat');
            showAlert(`Match tie \n Both have chosen Bat \n ${result()}`);

              }
        else if(1<randomnum && randomnum<=2){
             score.win++;
             console.log('comp has chosen Ball');
            showAlert(`You Won!! \n comp has chosen Ball \n ${result()}`);

        }
        else if(2<randomnum && randomnum<=3){
                score.lose++;
             console.log('comp has chosen Stump');
            showAlert(`You Lose! \n comp has chosen Stump \n ${result()}`);
            
        }
         console.log(score);
        "><img class="img" src="\js\images\bat.png"> Bat</button>
     <button class="button" onclick="
        console.log('you have chosen Ball');
         let randomnum1=Math.random()*3;
        if(randomnum1<=1){
                score.lose++;
            console.log('comp has chosen Bat');
            showAlert(`You lose! \n comp has chosen Bat \n ${result()}`);
            
        }
        else if(1<randomnum1 && randomnum1<=2){
                score.tie++;
             console.log('comp has chosen Ball');
            showAlert(`Match tie \n Both have chosen Ball \n ${result()}`);
            
        }
        else if(2<randomnum1 && randomnum1<=3){
                score.win++;
             console.log('comp has chosen Stump');
            showAlert(`You Won!! \n comp has chosen Stump \n ${result()}`);
            
        } 
         console.log(score);
        "><img class="img" src="\js\images\ball.png">Ball</button>
      <button class="button" onclick="
      console.log('you have chosen Stump');
      let randomnum2=Math.random()*3;
      if(randomnum2<=1){
        score.win++;
        console.log('comp has chosen Bat');
        showAlert(`You won!! \n comp has chosen Bat \n ${result()}`);
        
      }
      else if(1<randomnum2 && randomnum2<=2){
        score.lose++;
        console.log('comp has chosen Ball');
        showAlert(`You lose! \n comp has chosen Ball \n ${result()}`);
        

      }
      else if(2<randomnum2 && randomnum2<=3){
        score.tie++;
        console.log('comp has chosen Stump');
        showAlert(`Match tie! \n Both have chosen Stump \n ${result()}`);
        
      }
       console.log(score);
      " ><img class="img" src="\js\images\stump.png">Stump</button></div>

       <div class="rules">
        <b><ul>
            <li>bat beats ball </li>
            <li>ball beats stump</li>
            <li>stump throws the bat to pavilion</li>
        </ul></b>
    </div>
        
<a href="guess_cricket.html"><h1 class="game2">GAME 2?</h1></a>

</body>
</html>
